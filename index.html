<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a16719942b.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="search-box">
                <input type="text" placeholder="Enter your location" class="input-box">
                <button id="searchBtn">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- Location Not Found -->
            <div class="location-not-found" style="display: none;">
                <h1>Sorry, Location not found !!!</h1>
                <img src="/assets/404.png" alt="404 Error">
            </div>

            <!-- Weather Body -->
            <div class="weather-body" style="display: none;">
                <img src="/assets/cloud.png" alt="Weather Image" class="weather-img">

                <div class="weather-box">
                    <p class="temperature">0<sup>°C</sup></p>
                    <p class="description">Light rain</p>
                </div>

                <div class="weather-details">
                    <div class="humidity">
                        <i class="fa-solid fa-droplet"></i>
                        <div class="text">
                            <span class="humidity">45%</span>
                            <p>Humidity</p>
                        </div>
                    </div>

                    <div class="wind">
                        <i class="fa-solid fa-wind"></i>
                        <div class="text">
                            <span class="wind-speed">12 km/h</span>
                            <p>Wind Speed</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ✅ Fixed: Correct src attribute for script -->
    <script src="script.js"></script>
</body>
</html>
